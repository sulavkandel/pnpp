<!doctype html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./frontend/src/styles/main.css" />
    <script type="module" src="./frontend/src/scripts/role-login.js"></script>
  </head>
  <body data-role-page="department">
    <div class="topbar">
      <div class="container topbar-inner">
        <div class="topbar-brand" data-role-text="title">अधिकृत लगइन</div>
        <div class="topbar-meta">
          <a href="./index.html" class="track-link" data-role-text="back">नागरिक लगइनमा फर्कनुहोस्</a>
          <div class="lang-switch">
            <button type="button" class="lang-chip active" data-lang="ne">नेपाली</button>
            <button type="button" class="lang-chip" data-lang="en">English</button>
          </div>
        </div>
      </div>
    </div>

    <header class="portal-header">
      <div class="container masthead-inner">
        <div class="brand">
          <div class="brand-mark crest">नेपाल</div>
          <div>
            <p class="eyebrow small" data-role-text="gov">नेपाल सरकार</p>
            <h1 class="font-devanagari" data-role-text="heading">विभागीय अधिकृत पोर्टल लगइन</h1>
            <p class="brand-subtitle" data-role-text="subtitle">Officer access page</p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container narrow-shell">
          <div class="panel auth-panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow small" data-role-text="eyebrow">अधिकृत लगइन</p>
                <h3 data-role-text="formTitle">साप्ताहिक ड्यूटीमा रहेका अधिकृत मात्र</h3>
              </div>
            </div>
            <form class="auth-form" id="role-login-form">
              <label>
                <span data-role-text="portalLabel">पोर्टल छान्नुहोस्</span>
                <select id="portal-select">
                  <option value="ward" data-role-text="wardOption">वडा कार्यालय</option>
                  <option value="department" data-role-text="departmentOption">विभाग</option>
                </select>
              </label>
              <label>
                <span data-role-text="divisionLabel">महाशाखा छान्नुहोस्</span>
                <select id="division-select"></select>
              </label>
              <label>
                <span data-role-text="sectionLabel">साखा / युनिट छान्नुहोस्</span>
                <select id="section-select"></select>
              </label>
              <label>
                <span data-role-text="wardLabel">वडा छान्नुहोस्</span>
                <select id="ward-select"></select>
              </label>
              <label>
                <span data-role-text="userLabel">कार्यालय आईडी / युजरनेम</span>
                <input type="text" name="loginId" data-role-placeholder="userPlaceholder" placeholder="कार्यालय लगइन" />
              </label>
              <label>
                <span data-role-text="passwordLabel">पासवर्ड</span>
                <input type="password" name="password" data-role-placeholder="passwordPlaceholder" placeholder="पासवर्ड प्रविष्ट गर्नुहोस्" />
              </label>
              <a href="#" class="track-link" id="forgot-password-link" data-role-text="forgot">पासवर्ड बिर्सनुभयो?</a>
              <button type="button" class="button block secondary" data-role-text="button">विभाग / वडामा लगइन</button>
            </form>
            <div class="form-message" id="role-login-message"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
