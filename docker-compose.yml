services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      PORT: 4000
      MONGODB_URI: "${MONGODB_URI:-}"
      MONGODB_DIRECT_URI: "${MONGODB_DIRECT_URI:-}"
      MONGODB_DB_NAME: "${MONGODB_DB_NAME:-pnpp_portal}"
      MONGODB_FORCE_IPV4: "${MONGODB_FORCE_IPV4:-false}"
      MONGODB_USE_PUBLIC_DNS_ON_SRV_FAILURE: "${MONGODB_USE_PUBLIC_DNS_ON_SRV_FAILURE:-true}"
      MONGODB_DNS_SERVERS: "${MONGODB_DNS_SERVERS:-1.1.1.1,8.8.8.8}"
      JWT_SECRET: "${JWT_SECRET:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}"
    restart: unless-stopped
